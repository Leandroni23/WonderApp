<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WonderSync Pro 8.8</title>
    <style>
        :root { --main: #e94560; --bg: #050510; --card: rgba(22, 33, 62, 0.8); --input: #0f0f20; --money: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .app-header { background: rgba(15, 52, 96, 0.95); padding: 25px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .back-btn { position: absolute; left: 20px; top: 22px; font-size: 1.8rem; cursor: pointer; display: none; color: var(--main); }
        #mainMenu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-item { background: var(--card); padding: 25px 10px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        .dash-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--input); color: white; margin-bottom: 12px; font-size: 1rem; box-sizing: border-box; }
        label { font-size: 0.65rem; color: var(--main); font-weight: 900; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .action-btn { background: var(--main); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
        .progress-bg { background: var(--input); height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header">
        <span id="backBtn" class="back-btn" onclick="showMenu()">‹</span>
        <div id="appTitle" style="font-weight: 900; letter-spacing: 3px;">WONDERSYNC <span style="color:var(--main)">PRO</span></div>
    </div>

    <div id="mainMenu">
        <div class="menu-item" onclick="openSection('distributors', 'SHOPS')"><span style="font-size:2rem;display:block;">🏪</span>SHOPS</div>
        <div class="menu-item" onclick="openSection('pantry', 'WAREHOUSE')"><span style="font-size:2rem;display:block;">📦</span>WAREHOUSE</div>
        <div class="menu-item" onclick="openSection('suppliers', 'SUPPLIERS')"><span style="font-size:2rem;display:block;">🚚</span>SUPPLIERS</div>
        <div class="menu-item" onclick="openSection('workshop', 'PRINTERS')"><span style="font-size:2rem;display:block;">⚙️</span>PRINTERS</div>
        <div class="menu-item" onclick="openSection('library', 'LIBRARY')"><span style="font-size:2rem;display:block;">📚</span>LIBRARY</div>
        <div class="menu-item" onclick="openSection('orders', 'ORDERS')"><span style="font-size:2rem;display:block;">🛒</span>ORDERS</div>
    </div>

    <div id="workshop" class="section">
        <div class="dash-card">
            <label>Printer Name</label><input type="text" id="pName" placeholder="Wonder 1.0">
            <label>Service Every (Hours)</label><input type="number" id="pService" value="200">
            <button class="action-btn" onclick="addPrinter()">Register Printer</button>
        </div>
        <div id="printerList"></div>
    </div>

    <div id="distributors" class="section"><div id="locationList"></div></div>
    <div id="pantry" class="section">
        <div id="warehouseDisplay"></div>
    </div>
    
    <div id="suppliers" class="section"><h3>Supplier Hub</h3></div>
    <div id="library" class="section"><h3>STL Library</h3></div>
    <div id="orders" class="section"><h3>Customer Orders</h3></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yeiqourfbdormfeprvgq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllaXFvdXJmYmRvcm1mZXBydmdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODM1NTcsImV4cCI6MjA5MTI1OTU1N30.UWLPlGfNquzDYWow85CEztwpEMM9sgHlEeQLLPjRrdc'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            const { data: printers } = await supabaseClient.from('Printers').select('*');
            const { data: inv } = await supabaseClient.from('Inventory').select('*');
            const { data: loc } = await supabaseClient.from('Locations').select('*');

            const pList = document.getElementById('printerList');
            if(pList) {
                pList.innerHTML = "";
                (printers || []).forEach(p => {
                    const prog = (p.hours_since_service / p.service_interval) * 100;
                    pList.innerHTML += `
                    <div class="dash-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>⚙️ ${p.name}</b>
                            <span style="font-size:0.8rem; opacity:0.6;">Total: ${p.total_hours}h</span>
                        </div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(prog, 100)}%; background:${prog > 80 ? 'var(--main)':'var(--money)'};"></div></div>
                        <button class="action-btn" style="padding:10px; font-size:0.8rem;" onclick="logWork('${p.id}')">+ Log Work</button>
                    </div>`;
                });
            }

            const wD = document.getElementById('warehouseDisplay');
            if(wD) {
                wD.innerHTML = (inv || []).map(m => `<div class="dash-card"><b>${m.name}</b>: ${m.stock_g} pcs</div>`).join("");
            }

            const lD = document.getElementById('locationList');
            if(lD) {
                lD.innerHTML = (loc || []).map(l => `<div class="dash-card"><b>🏪 ${l.name}</b></div>`).join("");
            }
        }

        async function addPrinter() {
            const name = document.getElementById('pName').value;
            const service = document.getElementById('pService').value;
            if(!name) return;
            await supabaseClient.from('Printers').insert([{ name, service_interval: service }]);
            document.getElementById('pName').value = "";
            loadData();
        }

        async function logWork(id) {
            const hrs = prompt("Job Hours?", "5");
            if(!hrs) return;
            const { data: p } = await supabaseClient.from('Printers').select('*').eq('id', id).single();
            await supabaseClient.from('Printers').update({ 
                total_hours: (p.total_hours || 0) + parseFloat(hrs),
                hours_since_service: (p.hours_since_service || 0) + parseFloat(hrs)
            }).eq('id', id);
            loadData();
        }

        function openSection(id, title) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('appTitle').innerHTML = `WS ${title}`;
            document.getElementById('backBtn').style.display = 'block';
            loadData();
        }

        function showMenu() {
            document.getElementById('mainMenu').style.display = 'grid';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('appTitle').innerHTML = `WONDERSYNC PRO`;
            document.getElementById('backBtn').style.display = 'none';
        }

        loadData();
    </script>
</body>
</html>
