<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WonderSync Phase 1</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --main: #e94560; --bg: #050510; --card: rgba(22, 33, 62, 0.8); --input: #0f0f20; --money: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .app-header { background: rgba(15, 52, 96, 0.95); padding: 25px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .back-btn { position: absolute; left: 20px; top: 22px; font-size: 1.8rem; cursor: pointer; display: none; color: var(--main); }
        
        /* THE SIX PILLAR GRID */
        #mainMenu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-item { background: var(--card); padding: 25px 10px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .menu-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
        .menu-lbl { font-weight: 900; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

        .section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        .dash-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--input); color: white; margin-bottom: 12px; font-size: 1rem; }
        label { font-size: 0.65rem; color: var(--main); font-weight: 900; text-transform: uppercase; margin: 0 0 5px 5px; display: block; }
        .action-btn { background: var(--main); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header">
        <span id="backBtn" class="back-btn" onclick="showMenu()">‹</span>
        <div id="appTitle" style="font-weight: 900; letter-spacing: 3px; font-size: 1.1rem;">WS <span style="color:var(--main)">PHASE 1</span></div>
    </div>

    <div id="mainMenu">
        <div class="menu-item" onclick="openSection('distributors', 'SHOPS')"><span class="menu-icon">🏪</span><span class="menu-lbl">Shops</span></div>
        <div class="menu-item" onclick="openSection('pantry', 'WAREHOUSE')"><span class="menu-icon">📦</span><span class="menu-lbl">Warehouse</span></div>
        <div class="menu-item" onclick="openSection('suppliers', 'SUPPLIERS')"><span class="menu-icon">🚚</span><span class="menu-lbl">Suppliers</span></div>
        <div class="menu-item" onclick="openSection('library', 'LIBRARY')"><span class="menu-icon">📚</span><span class="menu-lbl">Library</span></div>
        <div class="menu-item" onclick="openSection('workshop', 'PRINTERS')"><span class="menu-icon">⚙️</span><span class="menu-lbl">Printers</span></div>
        <div class="menu-item" onclick="openSection('orders', 'ORDERS')"><span class="menu-icon">🛒</span><span class="menu-lbl">Orders</span></div>
    </div>

    <div id="distributors" class="section"><div id="locationList"></div></div>
    <div id="pantry" class="section"><div id="warehouseDisplay"></div></div>
    
    <div id="suppliers" class="section">
        <div class="dash-card">
            <label>Supplier Name</label><input type="text" placeholder="e.g. Amazon, Creality">
            <label>Website/Link</label><input type="text" placeholder="https://...">
            <button class="action-btn">Register Supplier</button>
        </div>
    </div>

    <div id="library" class="section">
        <div class="dash-card"><p style="text-align:center; opacity:0.5;">STL Model Files Storage Coming Soon</p></div>
    </div>

    <div id="workshop" class="section">
        <div class="dash-card">
            <label>Printer Name</label><input type="text" placeholder="e.g. Ender 3 V3">
            <label>Status</label>
            <select><option>Idle</option><option>Printing</option><option>Maintenance</option></select>
            <button class="action-btn">Add Printer</button>
        </div>
    </div>

    <div id="orders" class="section">
        <div class="dash-card"><p style="text-align:center; opacity:0.5;">Active Customer Orders Tracker</p></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
