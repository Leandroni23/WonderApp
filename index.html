<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WonderSync V11.2 - Precision Calculator</title>
    <style>
        :root { --main: #e94560; --bg: #050510; --card: rgba(22, 33, 62, 0.9); --input: #0f0f20; --money: #00ff88; --warn: #f39c12; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .app-header { background: rgba(15, 52, 96, 0.95); padding: 20px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .back-btn { position: absolute; left: 20px; top: 18px; font-size: 1.8rem; cursor: pointer; display: none; color: var(--main); }
        #mainMenu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-item { background: var(--card); padding: 25px 10px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: bold; }
        .section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        .dash-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--input); color: white; margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; }
        label { font-size: 0.65rem; color: var(--main); font-weight: 900; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .action-btn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: var(--input); padding: 12px; border-radius: 12px; text-align: center; }
        .money-text { color: var(--money); font-weight: 900; font-size: 1.2rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header">
        <span id="backBtn" class="back-btn" onclick="showMenu()">‹</span>
        <div id="appTitle" style="font-weight: 900; letter-spacing: 2px;">WONDERSYNC <span style="color:var(--main)">PRICING</span></div>
    </div>

    <div id="mainMenu">
        <div class="menu-item" onclick="openSection('creator', 'JOB CALCULATOR')">💰 CALCULATOR</div>
        <div class="menu-item" onclick="openSection('suppliers', 'FILAMENTS')">🧵 FILAMENT</div>
        <div class="menu-item" onclick="openSection('distributors', 'SHOPS')">🏪 SHOPS</div>
        <div class="menu-item" onclick="openSection('workshop', 'PRINTERS')">⚙️ PRINTERS</div>
        <div class="menu-item" onclick="openSection('parts', 'PARTS')">🔧 PARTS</div>
        <div class="menu-item" onclick="openSection('pl', 'P&L')">📊 P&L</div>
    </div>

    <div id="creator" class="section">
        <div class="dash-card" style="border: 2px solid var(--money);">
            <h3 style="margin:0 0 15px 0;">New Order Price 🧾</h3>
            <label>Order Name</label><input type="text" id="calcName" placeholder="Client X - Mask">
            
            <label>Filament Choice</label>
            <select id="calcFilId" onchange="runLiveCalc()"></select>
            
            <div class="grid-2">
                <div><label>Weight (Grams)</label><input type="number" id="calcG" oninput="runLiveCalc()" value="0"></div>
                <div><label>Print Time (Hours)</label><input type="number" id="calcHrs" oninput="runLiveCalc()" value="0"></div>
            </div>

            <label>Desired Profit Margin (%)</label>
            <input type="number" id="marginInput" oninput="runLiveCalc()" value="60">

            <div style="margin-top:20px; display:grid; gap:10px;">
                <div class="stat-box">
                    <label>Real Production Cost</label>
                    <div id="realCost" class="money-text" style="color:white;">€0.00</div>
                    <small style="font-size:0.6rem; opacity:0.6;">(Filament + €1/hr Machine)</small>
                </div>
                <div class="stat-box" style="border: 1px solid var(--money);">
                    <label>Suggested Retail Price</label>
                    <div id="suggestedPrice" class="money-text">€0.00</div>
                    <small style="font-size:0.6rem; opacity:0.6;">(To hit your % margin)</small>
                </div>
            </div>

            <button class="action-btn" style="margin-top:20px; background:var(--money); color:black;" onclick="saveAndInvoice()">Accept Order & Create Invoice</button>
        </div>
    </div>

    <div id="suppliers" class="section"><div id="filamentList"></div></div>
    <div id="distributors" class="section"><div id="locationList"></div></div>
    <div id="workshop" class="section"><div id="printerList"></div></div>
    <div id="parts" class="section"><div id="partsList"></div></div>
    <div id="pl" class="section"><div id="invoiceList"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yeiqourfbdormfeprvgq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllaXFvdXJmYmRvcm1mZXBydmdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODM1NTcsImV4cCI6MjA5MTI1OTU1N30.UWLPlGfNquzDYWow85CEztwpEMM9sgHlEeQLLPjRrdc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let filaments = [], printers = [], locations = [];

        async function loadData() {
            const { data: fil } = await supabaseClient.from('Filaments').select('*');
            const { data: pnt } = await supabaseClient.from('Printers').select('*');
            const { data: loc } = await supabaseClient.from('Locations').select('*');
            const { data: ivs } = await supabaseClient.from('Invoices').select('*').order('created_at', {ascending: false});

            filaments = fil || []; printers = pnt || []; locations = loc || [];

            const filSel = document.getElementById('calcFilId');
            if(filSel) filSel.innerHTML = filaments.map(f => `<option value="${f.id}">${f.name} (€${f.cost_per_kg}/kg)</option>`).join("");
            
            const iList = document.getElementById('invoiceList');
            if(iList) iList.innerHTML = (ivs || []).map(i => `<div class="dash-card"><b>${i.client_name}</b>: €${i.total_amount.toFixed(2)}</div>`).join("");
            
            runLiveCalc();
        }

        function runLiveCalc() {
            const f = filaments.find(f => f.id === document.getElementById('calcFilId').value);
            const g = parseFloat(document.getElementById('calcG').value) || 0;
            const hrs = parseFloat(document.getElementById('calcHrs').value) || 0;
            const marginGoal = parseFloat(document.getElementById('marginInput').value) || 0;

            const filamentCost = f ? (g * (f.cost_per_kg / 1000)) : 0;
            const machineCost = hrs * 1.0; // The €1/hr rule
            const totalProductionCost = filamentCost + machineCost;

            // Math to find price based on Margin: Price = Cost / (1 - Margin%)
            const multiplier = 1 - (marginGoal / 100);
            const suggestedPrice = multiplier > 0 ? (totalProductionCost / multiplier) : totalProductionCost;

            document.getElementById('realCost').innerText = `€${totalProductionCost.toFixed(2)}`;
            document.getElementById('suggestedPrice').innerText = `€${suggestedPrice.toFixed(2)}`;
        }

        async function saveAndInvoice() {
            const name = document.getElementById('calcName').value;
            const price = document.getElementById('suggestedPrice').innerText.replace('€', '');
            if(!name || price == "0.00") return alert("Enter Order Name!");
            
            await supabaseClient.from('Invoices').insert([{ 
                client_name: name, 
                total_amount: parseFloat(price),
                status: 'Pending'
            }]);
            
            alert("Order Saved to P&L!");
            showMenu();
        }

        function openSection(id, title) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('appTitle').innerHTML = title;
            document.getElementById('backBtn').style.display = 'block';
            loadData();
        }

        function showMenu() {
            document.getElementById('mainMenu').style.display = 'grid';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('appTitle').innerHTML = `WONDERSYNC PRO`;
            document.getElementById('backBtn').style.display = 'none';
        }

        loadData();
    </script>
</body>
</html>
