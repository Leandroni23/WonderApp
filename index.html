<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WonderSync Global 8.6</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --main: #e94560; --bg: #050510; --card: rgba(22, 33, 62, 0.8); --input: #0f0f20; --money: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .app-header { background: rgba(15, 52, 96, 0.95); padding: 20px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .back-btn { position: absolute; left: 20px; top: 18px; font-size: 1.5rem; cursor: pointer; display: none; }
        #mainMenu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-item { background: var(--card); padding: 25px 10px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .menu-item:hover { background: var(--main); }
        .menu-icon { font-size: 2rem; display: block; }
        .menu-lbl { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        .dash-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--input); color: white; margin-bottom: 10px; }
        label { font-size: 0.6rem; color: var(--main); font-weight: 900; text-transform: uppercase; margin-left: 5px; }
        .action-btn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; }
        .shop-inv-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--money); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header">
        <span id="backBtn" class="back-btn" onclick="showMenu()">‹</span>
        <div id="appTitle" style="font-weight: 900; letter-spacing: 2px;">WONDERSYNC <span style="color:var(--main)">GLOBAL</span></div>
    </div>

    <div id="mainMenu">
        <div class="menu-item" onclick="openSection('distributors', 'SHOPS')"><span class="menu-icon">🏪</span><span class="menu-lbl">Shops</span></div>
        <div class="menu-item" onclick="openSection('pantry', 'WAREHOUSE')"><span class="menu-icon">📦</span><span class="menu-lbl">Warehouse</span></div>
        <div class="menu-item" onclick="openSection('service', 'LIVE JOB')"><span class="menu-icon">🚀</span><span class="menu-lbl">Live Job</span></div>
        <div class="menu-item" onclick="openSection('workshop', 'WORKSHOP')"><span class="menu-icon">⚙️</span><span class="menu-lbl">Workshop</span></div>
    </div>

    <div id="pantry" class="section">
        <div class="dash-card">
            <label>Item Name</label><input type="text" id="invName" placeholder="e.g., WL Keychain">
            <label>Category</label>
            <select id="invCat">
                <option value="FINISHED">Finished Product (Ready to Sell)</option>
                <option value="PLA">Raw Filament (Grams)</option>
                <option value="PARTS">Components</option>
            </select>
            <label>Initial Stock</label><input type="number" id="invStock" placeholder="0">
            <button class="action-btn" onclick="addNewMaterial()">ADD TO GLOBAL PANTRY</button>
        </div>
        <div id="warehouseDisplay"></div>
    </div>

    <div id="distributors" class="section">
        <div id="locationList"></div>
    </div>

    <div id="service" class="section">
        <div id="dashProfit" style="text-align:center; font-size:2rem; font-weight:900; color:var(--money); margin-bottom:20px;">€0.00</div>
        <div class="dash-card">
            <p style="text-align:center; opacity:0.6;">Ready for the next print job.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yeiqourfbdormfeprvgq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllaXFvdXJmYmRvcm1mZXBydmdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODM1NTcsImV4cCI6MjA5MTI1OTU1N30.UWLPlGfNquzDYWow85CEztwpEMM9sgHlEeQLLPjRrdc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let materials = [], locations = [];

        async function loadAll() {
            const { data: inv } = await supabaseClient.from('Inventory').select('*');
            const { data: loc } = await supabaseClient.from('Locations').select('*');
            const { data: hist } = await supabaseClient.from('History').select('*');
            materials = inv; locations = loc;

            // Update Global Profit
            let profit = 0; hist.forEach(h => profit += h.profit);
            document.getElementById('dashProfit').innerText = "€" + profit.toFixed(2);

            // Render Warehouse
            const wD = document.getElementById('warehouseDisplay'); wD.innerHTML = "";
            inv.forEach(m => {
                wD.innerHTML += `<div class="dash-card" style="padding:10px; display:flex; justify-content:space-between;">
                    <span>${m.name}</span><b>${m.stock_g} ${m.category==='PLA'?'g':'units'}</b>
                </div>`;
            });

            // Render Shops (Intuitive Dispatcher)
            const lD = document.getElementById('locationList'); lD.innerHTML = "";
            loc.forEach(l => {
                let stockItems = "";
                if(l.inventory) {
                    for(let [name, qty] of Object.entries(l.inventory)) {
                        if(qty > 0) stockItems += `
                            <div class="shop-inv-item">
                                <span>${name} (x${qty})</span>
                                <button onclick="sellItem('${l.id}', '${name}')" style="background:var(--money); border:none; padding:5px 12px; border-radius:8px; font-weight:900;">SELL</button>
                            </div>`;
                    }
                }

                lD.innerHTML += `
                <div class="dash-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <b style="font-size:1.1rem;">🏪 ${l.name}</b>
                        <span style="color:var(--main); font-weight:bold;">${l.commission}% Fee</span>
                    </div>
                    <div id="items-${l.id}">${stockItems || "<small style='opacity:0.4'>No stock here yet.</small>"}</div>
                    <hr style="opacity:0.1; margin:15px 0;">
                    <label>Quick Dispatch From Pantry</label>
                    <div style="display:flex; gap:8px;">
                        <select id="sel-${l.id}" style="margin:0;">
                            ${materials.filter(m=>m.category==='FINISHED').map(m=>`<option value="${m.id}">${m.name} (${m.stock_g} at home)</option>`).join("")}
                        </select>
                        <input type="number" id="qty-${l.id}" placeholder="Qty" style="width:70px; margin:0;">
                        <button onclick="dispatch('${l.id}')" style="background:var(--main); color:white; border:none; padding:0 15px; border-radius:10px; font-weight:900;">+</button>
                    </div>
                </div>`;
            });
        }

        async function dispatch(locId) {
            const itemId = document.getElementById(`sel-${locId}`).value;
            const qty = parseInt(document.getElementById(`qty-${locId}`).value);
            if(!qty || qty <= 0) return;

            const item = materials.find(m => m.id == itemId);
            const loc = locations.find(l => l.id == locId);

            if(item.stock_g < qty) return alert("Not enough in your home pantry!");

            // Subtract from Home
            await supabaseClient.from('Inventory').update({ stock_g: item.stock_g - qty }).eq('id', itemId);
            // Add to Shop
            let inv = loc.inventory || {};
            inv[item.name] = (inv[item.name] || 0) + qty;
            await supabaseClient.from('Locations').update({ inventory: inv }).eq('id', locId);
            
            location.reload();
        }

        async function sellItem(locId, itemName) {
            const loc = locations.find(l => l.id == locId);
            const price = prompt(`Price sold at ${loc.name}?`, "5.00");
            if(!price) return;

            let inv = loc.inventory;
            inv[itemName] -= 1;
            const profit = parseFloat(price) * (1 - (loc.commission/100));

            await supabaseClient.from('Locations').update({ inventory: inv }).eq('id', locId);
            await supabaseClient.from('History').insert([{ print_name: `Sale: ${itemName} @ ${loc.name}`, profit: profit }]);
            location.reload();
        }

        async function addNewMaterial() {
            const name = document.getElementById('invName').value;
            const cat = document.getElementById('invCat').value;
            const stock = document.getElementById('invStock').value;
            await supabaseClient.from('Inventory').insert([{ name, category: cat, stock_g: stock, price_paid: 0 }]);
            location.reload();
        }

        function openSection(id, title) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('appTitle').innerHTML = `WONDERSYNC <span style="color:var(--main)">${title}</span>`;
            document.getElementById('backBtn').style.display = 'block';
        }
        function showMenu() {
            document.getElementById('mainMenu').style.display = 'grid';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('appTitle').innerHTML = `WONDERSYNC <span style="color:var(--main)">GLOBAL</span>`;
            document.getElementById('backBtn').style.display = 'none';
        }
        loadAll();
    </script>
</body>
</html>
