<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WonderSync Enterprise</title>
    <style>
        :root { --main: #e94560; --bg: #050510; --card: rgba(22, 33, 62, 0.9); --input: #0f0f20; --money: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .app-header { background: rgba(15, 52, 96, 0.95); padding: 20px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .back-btn { position: absolute; left: 20px; top: 18px; font-size: 1.8rem; cursor: pointer; display: none; color: var(--main); }
        
        /* Dashboard */
        .dash-section-title { padding: 15px 15px 5px; font-size: 0.7rem; letter-spacing: 2px; color: var(--main); font-weight: 900; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-item { background: var(--card); padding: 20px 10px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        
        /* Sections */
        .section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Filament UI */
        .fil-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; display: inline-block; margin-bottom: 5px; }
        .fil-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; text-align: center; margin-top: 15px; }
        .fil-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; font-size: 0.7rem; }

        /* Forms */
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--input); color: white; margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; }
        label { font-size: 0.65rem; color: var(--main); font-weight: 900; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .btn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-header">
        <span id="backBtn" class="back-btn" onclick="showMenu()">‹</span>
        <div id="appTitle" style="font-weight: 900; letter-spacing: 2px;">WONDERSYNC <span style="color:var(--main)">V12</span></div>
    </div>

    <div id="mainMenu">
        <div class="dash-section-title">INTERNAL OPS & CREATOR</div>
        <div class="menu-grid">
            <div class="menu-item" onclick="openSection('sec-calc', 'COST CALCULATOR')">⚖️ Pricing</div>
            <div class="menu-item" onclick="openSection('sec-fil', 'FILAMENT INV')">🧵 Filament</div>
            <div class="menu-item" onclick="openSection('sec-parts', 'PARTS & SUPPLIES')">🔧 Parts</div>
            <div class="menu-item" onclick="openSection('sec-ware', 'WAREHOUSE')">📦 Warehouse</div>
        </div>

        <div class="dash-section-title">FRANCHISE & BI</div>
        <div class="menu-grid">
            <div class="menu-item" onclick="openSection('sec-fran', 'LOCATIONS')">🏪 Franchise</div>
            <div class="menu-item" onclick="openSection('sec-maint', 'MAINTENANCE')">⚙️ Printers</div>
            <div class="menu-item" onclick="openSection('sec-pl', 'P&L DATA')">💰 Profit/Loss</div>
            <div class="menu-item" onclick="openSection('sec-invest', 'INVESTMENT')">🏛️ Investment</div>
        </div>
    </div>

    <div id="sec-calc" class="section">
        <div class="card">
            <label>Filament Used</label><select id="calcFil"></select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Weight (g)</label><input type="number" id="calcG" oninput="runCalc()"></div>
                <div><label>Time (Hrs)</label><input type="number" id="calcH" oninput="runCalc()"></div>
            </div>
            <div style="background:var(--input); padding:15px; border-radius:15px; text-align:center;">
                <label>Real Cost (Fil + €1/hr)</label>
                <div id="res-cost" style="font-size:1.5rem; font-weight:bold;">€0.00</div>
            </div>
        </div>
    </div>

    <div id="sec-fil" class="section">
        <div class="card">
            <label>Brand / Name</label><input type="text" id="fn" placeholder="e.g. Elegoo White">
            <label>Type</label>
            <select id="ft">
                <option>PLA</option><option>PETG</option><option>ABS</option><option>TPU</option><option>Resin</option>
            </select>
            <label>Spool Color</label>
            <input type="color" id="fc_hex" value="#ffffff" style="height: 50px; padding: 5px;">
            <label>Price per kg (€)</label><input type="number" id="fc_price" placeholder="18.50">
            <button class="btn" onclick="saveFilament()">Add Spool</button>
        </div>
        
        <div class="dash-section-title">ACTIVE SPOOLS</div>
        <div id="filList" class="fil-grid"></div>
    </div>

    <div id="sec-maint" class="section"><div id="printList"></div></div>
    <div id="sec-parts" class="section"><div class="card">🔧 Parts tracking...</div></div>
    <div id="sec-ware" class="section"><div class="card">📦 Warehouse stock...</div></div>
    <div id="sec-fran" class="section"><div class="card">🏪 Franchise...</div></div>
    <div id="sec-pl" class="section"><div class="card">💰 P&L...</div></div>
    <div id="sec-invest" class="section"><div class="card">🏛️ Investment...</div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yeiqourfbdormfeprvgq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllaXFvdXJmYmRvcm1mZXBydmdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODM1NTcsImV4cCI6MjA5MTI1OTU1N30.UWLPlGfNquzDYWow85CEztwpEMM9sgHlEeQLLPjRrdc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let filaments = [];

        async function init() {
            const { data: f } = await supabase.from('Filaments').select('*');
            const { data: p } = await supabase.from('Printers').select('*');
            filaments = f || [];
            
            // Populate Calculator
            document.getElementById('calcFil').innerHTML = filaments.map(x => `<option value="${x.cost_per_kg}">${x.name} (${x.type})</option>`).join('');
            
            // Render Filament Grid (Elegoo Style)
            document.getElementById('filList').innerHTML = filaments.map(x => `
                <div class="fil-item">
                    <div class="fil-dot" style="background-color: ${x.color_hex || '#fff'}"></div>
                    <div style="font-weight:bold">${x.type}</div>
                    <div style="opacity:0.7">${x.name}</div>
                </div>
            `).join('');
            
            // Populate Printers
            document.getElementById('printList').innerHTML = (p || []).map(x => `<div class="card"><b>${x.name}</b><br><small>${x.total_hours}h total</small></div>`).join('');
        }

        async function saveFilament() {
            const name = document.getElementById('fn').value;
            const type = document.getElementById('ft').value;
            const color = document.getElementById('fc_hex').value;
            const price = document.getElementById('fc_price').value;

            if(!name || !price) return alert("Fill all fields");

            await supabase.from('Filaments').insert([{ 
                name: name, 
                type: type, 
                color_hex: color, 
                cost_per_kg: price 
            }]);
            
            init();
        }

        function runCalc() {
            const costPerKg = parseFloat(document.getElementById('calcFil').value) || 0;
            const grams = parseFloat(document.getElementById('calcG').value) || 0;
            const hrs = parseFloat(document.getElementById('calcH').value) || 0;
            const final = (grams * (costPerKg / 1000)) + (hrs * 1.0);
            document.getElementById('res-cost').innerText = `€${final.toFixed(2)}`;
        }

        function openSection(id, title) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('appTitle').innerText = title;
            document.getElementById('backBtn').style.display = 'block';
            init();
        }

        function showMenu() {
            document.getElementById('mainMenu').style.display = 'block';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('appTitle').innerHTML = 'WONDERSYNC <span style="color:#e94560">V12</span>';
            document.getElementById('backBtn').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
