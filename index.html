<div id="workshop" class="section">
    <div class="dash-card">
        <label>Add New Printer</label>
        <input type="text" id="pName" placeholder="Printer Name (e.g. Ender 3)">
        <label>Service Every (Hours)</label>
        <input type="number" id="pService" value="200">
        <button class="action-btn" onclick="addPrinter()">+ Register Printer</button>
    </div>
    
    <div id="printerList"></div>
</div>

<script>
    // --- SMART WORKSHOP LOGIC ---

    async function loadPrinters() {
        const { data: pData } = await supabaseClient.from('Printers').select('*');
        const pList = document.getElementById('printerList');
        pList.innerHTML = "";

        pData.forEach(p => {
            const progress = (p.hours_since_service / p.service_interval) * 100;
            const barColor = progress > 80 ? 'var(--main)' : 'var(--money)';
            
            pList.innerHTML += `
                <div class="dash-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="font-size:1.2rem;">⚙️ ${p.name}</b>
                        <span style="font-size:0.8rem; opacity:0.7;">Total: ${p.total_hours}h</span>
                    </div>
                    
                    <div style="margin:15px 0;">
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:5px;">
                            <span>Maintenance Awareness</span>
                            <span>${p.hours_since_service} / ${p.service_interval} hrs</span>
                        </div>
                        <div style="background:var(--input); height:12px; border-radius:6px; overflow:hidden;">
                            <div style="width:${Math.min(progress, 100)}%; background:${barColor}; height:100%; transition:0.5s;"></div>
                        </div>
                    </div>

                    <div style="display:flex; gap:10px;">
                        <button onclick="logWork('${p.id}')" style="flex:2; background:rgba(255,255,255,0.1); border:none; color:white; padding:10px; border-radius:10px; font-weight:bold;">+ Log Work</button>
                        <button onclick="resetMaintenance('${p.id}')" style="flex:1; background:none; border:1px solid var(--money); color:var(--money); padding:10px; border-radius:10px; font-size:0.7rem;">🛠 Reset</button>
                    </div>
                </div>
            `;
        });
    }

    async function addPrinter() {
        const name = document.getElementById('pName').value;
        const interval = document.getElementById('pService').value;
        await supabaseClient.from('Printers').insert([{ 
            name: name, 
            service_interval: interval, 
            total_hours: 0, 
            hours_since_service: 0 
        }]);
        loadPrinters();
    }

    async function logWork(id) {
        const hrs = prompt("How many hours was this print job?", "5");
        if (!hrs) return;
        
        // Fetch current data
        const { data: p } = await supabaseClient.from('Printers').select('*').eq('id', id).single();
        
        await supabaseClient.from('Printers').update({ 
            total_hours: p.total_hours + parseFloat(hrs),
            hours_since_service: p.hours_since_service + parseFloat(hrs)
        }).eq('id', id);
        
        loadPrinters();
    }

    async function resetMaintenance(id) {
        if(confirm("Confirm Maintenance performed? (Clears the awareness bar)")) {
            await supabaseClient.from('Printers').update({ hours_since_service: 0 }).eq('id', id);
            loadPrinters();
        }
    }
</script>
